<div class="min-h-screen flex justify-center items-center bg-surface-100 p-4">

  <p-card header="Crear cuenta" class="w-full max-w-lg shadow-xl">

    <form
      [formGroup]="signUpForm"
      (ngSubmit)="onSubmit()"
      class="flex flex-col gap-5">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <p-floatlabel variant="on">
          <input
            pInputText
            id="firstName"
            formControlName="firstName"
            class="w-full" />
          <label for="firstName">Nombre</label>
        </p-floatlabel>

        <p-floatlabel variant="on">
          <input
            pInputText
            id="lastName"
            formControlName="lastName"
            class="w-full" />
          <label for="lastName">Apellido</label>
        </p-floatlabel>

      </div>

      <p-floatlabel variant="on">

        <p-icon-field>
       
          <input
              pInputText
              id="email"
              formControlName="email"
              class="w-full" />
              
              <p-inputicon class="pi pi-spinner pi-spin"></inputicon>

           </p-icon-field >
            
          <label for="email">Correo electrónico</label>

        </p-floatlabel>

      <p-floatlabel variant="on">

        <p-datepicker 
          inputId="birthDate"
          formControlName="birthDate"
          dateFormat="dd/mm/yy" 
          [iconDisplay]="'input'" 
          [showIcon]="true" 
          inputId="icondisplay" />
        <label for="birthDate">Fecha de nacimiento</label>
      </p-floatlabel>

      <p-divider></p-divider>

      <p-floatlabel variant="on">
        <p-password
          inputId="password"
          formControlName="password"
          [feedback]="true"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full">
        </p-password>
        <label for="password">Contraseña</label>
      </p-floatlabel>

      <p-floatlabel variant="on">
        <p-password
          inputId="confirmPassword"
          formControlName="confirmPassword"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full">
        </p-password>
        <label for="confirmPassword">Repetir contraseña</label>
      </p-floatlabel>

      <p-button
        label="Registrarse"
        icon="pi pi-user-plus"
        type="submit"
        styleClass="w-full">
      </p-button>

    </form>

  </p-card>

</div>
